name: SoundTouchCompanion
options:
  bundleIdPrefix: com.jeffevertse
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

targets:
  SoundTouchCompanion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoundTouchCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jeffevertse.SoundTouchCompanion
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: SoundTouchCompanion/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
