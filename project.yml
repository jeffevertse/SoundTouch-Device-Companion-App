name: SoundTouchCompanion
options:
  bundleIdPrefix: com.jeffevertse
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

targets:
  SoundTouchCompanion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoundTouchCompanion
        excludes:
          - Info.plist
    info:
      path: SoundTouchCompanion/Info.plist
      properties:
        CFBundleName: SoundTouch
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jeffevertse.SoundTouchCompanion
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 2C39YHVFA2
